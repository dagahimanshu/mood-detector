spring.application.name=mood-detector
server.port=8080
spring.config.import=optional:classpath:application-local.properties

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=22MB

logging.level.com.mooddetector=INFO
spring.jackson.serialization.indent-output=false

# HuggingFace Inference API (VLM via router)
huggingface.api-token=${HUGGINGFACE_API_TOKEN:}
huggingface.vision-model=${HUGGINGFACE_VISION_MODEL:Qwen/Qwen3-VL-8B-Instruct}