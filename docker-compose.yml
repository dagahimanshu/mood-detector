version: '3.8'

services:
  mood-detector:
    # Build from the Dockerfile in the current directory
    build: .

    # Name of the running container
    container_name: mood-detector-container

    # Map host port 8080 to container port 8080
    ports:
      - "8080:8080"

    # Restart automatically if the container crashes
    restart: unless-stopped

    # Pass environment variables into the container.
    # These override values in application.properties.
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=default

    # Resource limits — prevents the container from consuming all your RAM
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M